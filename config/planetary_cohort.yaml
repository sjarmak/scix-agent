# Discipline-gated planetary cohort definition (xz4.p2v).
#
# Used by scripts/link_targets_discipline_gated.py to scope the SsODNet
# minor-body Aho-Corasick scan to papers where short asteroid/comet/moon
# names are unlikely to be false positives.
#
# Cohort membership: a paper is in-cohort if ANY of the following holds.

# arXiv subject classes that are dominantly planetary or space-physics.
# Restrict to truly planetary classes — broad astro-ph classes (.GA, .HE,
# .SR, .CO, .IM) admit too much non-planetary noise for a relaxed match.
arxiv_classes:
  - astro-ph.EP
  - physics.space-ph

# Planetary-science journal/proceedings bibstems. ApJ/MNRAS/A&A are
# deliberately omitted — they would balloon the cohort to ~1M papers and
# include many non-planetary records that would re-trigger the original
# false-positive problem the discipline gate is meant to prevent.
bibstems:
  - Icar       # Icarus
  - M&PS       # Meteoritics & Planetary Science
  - M&PSA      # M&PS abstracts
  - P&SS       # Planetary and Space Science
  - JGRE       # JGR: Planets
  - LPI        # LPI Contributions
  - LPSC       # LPSC
  - LPICo      # LPI Contributions (alt)
  - EM&P       # Earth, Moon, and Planets
  - SoSyR      # Solar System Research
  - AsBio      # Astrobiology
  - EPSC       # European Planetary Science Congress
  - DPS        # AAS Division for Planetary Sciences
  - SSRv       # Space Science Reviews
  - JGRA       # JGR: Space Physics

# Optional: keyword sentinels (papers whose `keywords` array contains any
# of these are admitted to the cohort even outside the arxiv/bibstem
# above). Lower-case matched. Conservative list — common planetary
# science vocabulary that rarely appears outside-domain.
keyword_sentinels:
  - asteroid
  - asteroids
  - comet
  - comets
  - meteorite
  - meteorites
  - meteor
  - kuiper belt
  - kuiper-belt
  - oort cloud
  - trans-neptunian
  - trans-neptunian object
  - kbo
  - tno
  - near-earth object
  - near-earth asteroid
  - nea
  - neo
  - jupiter trojan
  - hilda asteroid
  - main-belt
  - main belt asteroid
  - centaur
  - planetary surface
  - planetary atmosphere
  - regolith

# Linker safety knobs.
#
# `min_surface_length_unconditional` is the floor for SINGLE-TOKEN names
# without digits — surfaces shorter than this are dropped at automaton-
# build time. Multi-token names ("Comet Hale-Bopp") and designations
# ("2005 VA") bypass the length check; the digit pattern and multi-word
# structure are themselves disambiguating.
#
# An initial production run with `min_surface_length_unconditional: 6`
# produced 531K candidate links but the 100-row precision sample showed
# precision ≪ 0.90 — the false positives were dominated by minor-body
# names that collide with common English words (asteroid 115880 "The",
# 106088 "NOT", 119371 "Srivastava" surname collision). Bumped to 7 and
# layered on the stop-word filter below.
min_surface_length_unconditional: 7

# Stop-word filter. Any SsODNet canonical name or alias whose lowercase
# form is in this set is excluded from the AC automaton. The English
# dictionary alone removes ~2,500 minor-body names (~0.17 % of the SsODNet
# pool) and dramatically lifts precision. Missing files are skipped with
# a warning.
stop_words_files:
  - /etc/dictionaries-common/words

# Hand-curated additions on top of the dictionary list — scientific
# acronyms, observatory names, common surnames not in the dictionary,
# and false positives observed in the first precision sample.
stop_words_extra:
  # Scientific acronyms / instruments
  - nasa
  - jpl
  - esa
  - ccd
  - linear
  - lonos
  - imap
  - icme
  # Mission / spacecraft names commonly cited in planetary papers
  - cassini
  - apollo
  - opportunity
  - spirit
  - kaguya
  - selene
  - discovery
  - psyche  # the spacecraft, not the asteroid
  # Common-word minor-body names that the dictionary may miss
  - doppler
  - chang
  # Common surnames frequently cited in planetary literature that
  # collide with asteroid namesakes
  - tomasko
  - srivastava
  - scheeres
  - edgeworth
  - castillo

# Tokens that, when co-present with a short minor-body name, raise the
# match to acceptable. Lower-cased, whole-word match.
short_name_disambiguators:
  - asteroid
  - asteroids
  - comet
  - comets
  - meteorite
  - moon
  - moons
  - planet
  - planets
  - planetary
  - satellite
  - satellites
  - orbit
  - orbital
  - spacecraft
  - mission
  - flyby
  - sample-return
  - regolith
  - crater
  - craters
  - minor body
  - minor-body
  - solar system
  - dwarf planet
  - trojan
  - kuiper
  - oort
  - tno
  - kbo
  - neo
  - nea
