# Template ONLY — do not commit real secrets to git.
#
# The recommended path is to create the Secret directly with kubectl so the
# values never touch a file:
#
#   kubectl -n scix-mcp create secret generic scix-mcp-secrets \
#     --from-literal=MCP_AUTH_TOKEN="$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')" \
#     --from-literal=SCIX_DSN="host=postgres.scix-mcp.svc.cluster.local dbname=scix user=scix_reader password=REPLACE_ME"
#
# If you prefer GitOps (SealedSecrets / SOPS / External Secrets), encrypt
# this file with your operator of choice before committing.
apiVersion: v1
kind: Secret
metadata:
  name: scix-mcp-secrets
  namespace: scix-mcp
  labels:
    app: scix-mcp
type: Opaque
stringData:
  # Bearer token required on every MCP request.
  # Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
  MCP_AUTH_TOKEN: "REPLACE_WITH_32+_BYTE_RANDOM_TOKEN"

  # Postgres DSN. Point at the cluster's managed Postgres (RDS) or
  # in-cluster service — e.g. postgres.scix-mcp.svc.cluster.local. Use the
  # read-only role, never the superuser.
  SCIX_DSN: "host=REPLACE_ME dbname=scix user=scix_reader password=REPLACE_ME"
