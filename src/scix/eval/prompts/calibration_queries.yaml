# Calibration seed queries for the UMBRELA judge.
#
# 50 queries spread across the 6 entity-enrichment value-prop lanes
# (see docs/prd/amendments/2026-04-18-m6-m12-collapse.md):
#
#   - alias            : query uses an acronym that should be expanded via
#                        entity_aliases (HST -> Hubble Space Telescope, etc.)
#   - ontology         : query carries an ontology predicate that maps to a
#                        JSONB property filter (M-type asteroid, IR instrument).
#   - disambiguation   : query contains a homograph (Hubble, Psyche, Kepler,
#                        Cassini) that must resolve to the correct sense.
#   - entity_type      : query is scoped by entity *type* (instrument, mission,
#                        asteroid) rather than a specific entity.
#   - specific_entity  : query pinpoints one entity and we want papers
#                        mentioning it (JWST, TRAPPIST-1, Sgr A*).
#   - community        : query targets a coherent subfield; retrieval should
#                        recover papers from the same Leiden citation community.
#
# This file is an input to scripts/generate_calibration_seed.py. The script
# runs hybrid_search on each query, picks top-K candidate bibcodes, and
# dispatches the umbrela_judge subagent to draft a score for each pair.

version: 1
default_top_k: 5  # candidates per query; total rows = n_queries * default_top_k

queries:
  # ---- alias expansion (8) ----
