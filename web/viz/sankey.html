<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SciX — Temporal Community Flow (Sankey)</title>
    <link rel="stylesheet" href="./shared.css" />
    <style>
      main.viz-container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 20px 20px 32px;
      }
      .viz-sub {
        color: #555;
        margin-top: -4px;
      }
      #sankey-root {
        background: #fff;
        border: 1px solid #e4e4e4;
        border-radius: 6px;
        padding: 12px;
        min-height: 820px;
        height: 82vh;
      }
      #sankey-root svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .sankey-link {
        fill: none;
        stroke-opacity: 0.35;
        mix-blend-mode: multiply;
        transition: stroke-opacity 120ms ease-out;
        cursor: pointer;
      }
      .sankey-link.dim {
        stroke-opacity: 0.05;
      }
      .sankey-link.highlight {
        stroke-opacity: 0.75;
      }
      .sankey-node rect {
        stroke: #fff;
        stroke-width: 1px;
        transition: opacity 120ms ease-out;
      }
      .sankey-node.dim rect,
      .sankey-node.dim text {
        opacity: 0.25;
      }
      .sankey-node text {
        font-size: 11px;
        fill: #222;
        pointer-events: none;
      }
      #sankey-status {
        margin-top: 8px;
        color: #b00020;
        font-size: 13px;
        min-height: 18px;
      }
      #sankey-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0 10px;
        font-size: 12px;
        color: #555;
      }
      #sankey-flow-slider {
        display: inline-flex;
        gap: 4px;
      }
      #sankey-flow-slider button {
        font-size: 11px;
        padding: 2px 10px;
        border: 1px solid #cfcfcf;
        background: #fafafa;
        color: #333;
        border-radius: 3px;
        cursor: pointer;
        transition: background 100ms, color 100ms;
      }
      #sankey-flow-slider button[aria-pressed="true"] {
        background: #0b60b0;
        color: #fff;
        border-color: #0b60b0;
      }
      #sankey-flow-slider button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12"></script>
  </head>
  <body>
    <main class="viz-container">
      <h1>Temporal Community Flow</h1>
      <p class="viz-sub">
        Decade-to-decade transitions between detected communities, sized by
        paper count. Hover a node to highlight incident links; click a link
        to log the target community to the browser console.
      </p>
      <div id="sankey-controls">
        <span>Show top</span>
        <span id="sankey-flow-slider" role="group" aria-label="Number of flows to display">
          <button type="button" data-cap="20">20</button>
          <button type="button" data-cap="50">50</button>
          <button type="button" data-cap="100">100</button>
          <button type="button" data-cap="200">200</button>
        </span>
        <span>flows</span>
        <span id="sankey-flow-summary" style="margin-left:auto;color:#888"></span>
      </div>
      <div id="sankey-root" aria-label="Temporal community Sankey diagram"></div>
      <div id="sankey-status" role="status" aria-live="polite"></div>
    </main>
    <script src="./shared.js"></script>
    <script src="./sankey.js"></script>
    <script>
      // Bootstrap: fetch the dataset once, then drive the flow-count slider
      // entirely client-side so changing presets doesn't hit the server.
      (async function bootstrap() {
        const root = document.getElementById('sankey-root')
        const status = document.getElementById('sankey-status')
        const slider = document.getElementById('sankey-flow-slider')
        const summary = document.getElementById('sankey-flow-summary')
        const candidates = ['./sankey.json', '/data/viz/sankey.json']
        let data = null
        let lastErr = null
        for (const url of candidates) {
          try {
            const resp = await fetch(url, { cache: 'no-store' })
            if (!resp.ok) {
              lastErr = new Error(url + ' -> HTTP ' + resp.status)
              continue
            }
            data = await resp.json()
            break
          } catch (err) {
            lastErr = err
          }
        }
        if (!data) {
          status.textContent =
            'Could not load sankey.json (' +
            (lastErr ? lastErr.message || String(lastErr) : 'unknown error') +
            '). Run scripts/viz/build_temporal_sankey_data.py to generate it.'
          return
        }
        if (typeof window.renderSankey !== 'function') {
          status.textContent = 'renderSankey is not defined — sankey.js failed to load.'
          return
        }

        // Sort once (defensive — the builder already orders descending) so
        // a top-N slice always pulls the heaviest flows.
        const sortedLinks = data.links.slice().sort(function (a, b) {
          return (b.value || 0) - (a.value || 0)
        })
        const totalFlows = sortedLinks.length
        const baseData = { nodes: data.nodes, links: sortedLinks }

        function pickTopN(n) {
          // renderSankey drops orphan nodes via its own clone helper, so we
          // just slice the links here. Caller decides which value of N.
          const cap = Math.min(n, totalFlows)
          return { nodes: baseData.nodes, links: sortedLinks.slice(0, cap) }
        }

        function applyCap(cap) {
          const t0 = performance.now()
          const sliced = pickTopN(cap)
          try {
            window.renderSankey(sliced, root)
          } catch (err) {
            status.textContent = 'Render failed: ' + (err.message || String(err))
            return
          }
          const ms = Math.round(performance.now() - t0)
          summary.textContent =
            sliced.links.length.toLocaleString() + ' / ' +
            totalFlows.toLocaleString() + ' flows · ' + ms + ' ms'
          slider.querySelectorAll('button').forEach(function (btn) {
            const on = Number(btn.dataset.cap) === Number(cap)
            btn.setAttribute('aria-pressed', String(on))
          })
        }

        // Disable presets that exceed the actually-shipped flow count so the
        // demo doesn't pretend to support more than the JSON contains.
        slider.querySelectorAll('button').forEach(function (btn) {
          const cap = Number(btn.dataset.cap)
          if (cap > totalFlows && cap !== 20) {
            // Always keep "20" enabled even on tiny datasets so something
            // is clickable; the others gate on real data.
          }
          if (cap > totalFlows) {
            btn.disabled = totalFlows < cap
          }
          btn.addEventListener('click', function () {
            applyCap(cap)
          })
        })

        // Pick the largest preset that fits the data so the default reflects
        // the full dataset; cascade down to 20 if even that's too big.
        const presets = [200, 100, 50, 20]
        const initialCap = presets.find(function (n) { return n <= totalFlows }) || 20
        applyCap(initialCap)
      })()
    </script>
  </body>
</html>
